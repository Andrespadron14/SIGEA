<!DOCTYPE html>
<html lang="es-VE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="SIGEA - Sistema de Gestión de Edificaciones Afectadas. Plataforma de monitoreo y control de estructuras afectadas por eventos naturales en Guarenas, municipio Plaza.">
  <meta name="application-name" content="SIGEA">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>SIGEA - Gestión de Edificaciones Afectadas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .leaflet-popup-content-wrapper { border-radius: 8px; }
    .leaflet-popup-content { margin: 10px 14px; font-family: 'Inter', sans-serif; font-size: 13px; }
    .chart-card canvas { max-height: 200px; max-width: 100%; }
    .sidebar-hidden #sidebar { transform: translateX(-100%); }
    .sidebar-hidden #main-content { margin-left: 0; }
  </style>
</head>
<body>

<div id="app-shell">
  <aside id="sidebar" role="navigation" aria-label="Navegación principal">
    <div class="sidebar-header">
      <div class="logo">SG</div>
      <div class="title">
        <strong>SIGEA</strong>
        Gestión de Edificaciones Afectadas
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div>v1.0 &bull; Alcaldía municipio Plaza</div>
      <div>Guarenas &bull; Estado Miranda</div>
    </div>
  </aside>

  <div id="main-content">
    <header id="header">
      <div class="header-left">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="header-title" id="headerTitle">Dashboard</span>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="globalSearch" placeholder="Buscar..." autocomplete="off">
        </div>
        <div class="user-info" id="userInfo">
          <div class="user-avatar">CM</div>
          <div>
            <div class="user-name" id="userName">Carlos Mendoza</div>
            <div class="user-role" id="userRole">Administrador</div>
          </div>
        </div>
      </div>
    </header>

    <main id="page-container">
      <div id="page-content"></div>
    </main>
  </div>
</div>

<div id="modal-container"></div>
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide-icons@0.263.1/dist/umd/lucide.min.js"></script>
<script src="app.js"></script>
</body>
</html>
